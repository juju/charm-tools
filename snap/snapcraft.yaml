name: charm
adopt-info: charm-tools
summary: charm-tools
description: |
  Tools for building and maintaining reactive charms.
license: GPL-3.0
confinement: classic
grade: stable
base: core24
apps:
  charm:
    command: bin/wrappers/charm
environment:
  # To enable execution of binaries from snap, and the host operating system,
  # we patch all ELF binaries shipped with the snap in the 'patchelf' part
  # instead of using the LD_LIBRARY_PATH environment variable.
  #
  # This is required because both libc and other standard libraries hard code
  # the path to /bin/sh, and uses that to execute other binaries.  The path to
  # /bin/sh is part of POSIX, so we can't really blame them.  Any attempt to
  # execute /bin/sh from host operating system with LD_LIBRARY_PATH pointing
  # to the snap will make the execution abort or fault.
  LD_LIBRARY_PATH: ""
  PATH: $SNAP/usr/local/bin:$PATH
  PYTHONHOME: $SNAP
  PYTHONPATH: $SNAP/usr/lib/python3/dist-packages:$SNAP/usr/lib/python3.12/site-packages:$SNAP/usr/lib/python3.12:$SNAP/usr/lib/python3.12/lib-dynload:$SNAP/usr/local/lib/python3.12/dist-packages
parts:
  charm-tools:
    source: .
    # the core24 python plugin does not work for classic snaps.
    # a side effect of this is that we do patchelf manually as a separate part.
    plugin: nil
    build-packages:
      - libffi-dev
      - libpython3.12-dev
      - python3-pip
      - rustc
      - cargo
      - pkg-config
    # Note that we cannot use any -dev type packages here, as that would pull
    # in the libc6 package.  The libc6 package contains absolute symlinks
    # pointing at /, which is not allowed in a core24 classic snap.
    stage-packages:
      - libbrotli1
      - git-core
      - libpython3.12t64
      - libpython3.12-minimal
      - libpython3.12-stdlib
      - python3-minimal
      - python3.12-minimal
      - python3-cryptography
      - python3-pip
      - python3-setuptools
      - python3-six
      - python3-importlib-resources
      - python3-pkg-resources
      - python3-virtualenv
      - python3-requests
      - python3-yaml
      - python3-cheetah
      - python3-blessings
      - python3-ruamel.yaml
      - python3-pathspec
      - python3-path
      - python3-jsonschema
      - python3-secretstorage
      - python3-translationstring
      - python3-iso8601
      - python3-parse
    build-environment:
      - MAKEFLAGS: -j$(nproc)
      - CFLAGS: -I/usr/include/python3.12
    override-build: |
      # Upgrading setuptools helps to fix:
      #
      #   ERROR: setuptools==59.6.0 is used in combination with setuptools_scm>=8.x
      #   Your build configuration is incomplete and previously worked by accident!
      #   setuptools_scm requires setuptools>=61
      pip install --break-system-packages --upgrade --no-binary :all: 'setuptools<82'

      # Keep source builds for all dependencies so the snap can be built on
      # every supported architecture, including architectures that may not have
      # wheels. core24 provides a new enough python3-pathspec for modern build
      # backends such as hatchling, so no binary-only workaround is needed.
      pip install \
          --break-system-packages \
          --no-binary :all: \
          --prefix $CRAFT_PART_INSTALL/usr \
          .

      # This package has lists charm-tools as a requirement, so we need to
      # pass `--no-deps`, otherwise it will overwrite the charm-tools we just
      # installed above!
      pip install \
          --break-system-packages \
          --no-deps \
          --prefix $CRAFT_PART_INSTALL/usr \
          https://github.com/openstack-charmers/charm-templates-openstack/archive/master.zip#egg=charm_templates_openstack
      sed -i "$CRAFT_PART_INSTALL/usr/lib/python3.12/site.py" -e 's/^ENABLE_USER_SITE = None$/ENABLE_USER_SITE = False/'

      mkdir -p $CRAFT_PART_INSTALL/bin/wrappers
      cp helpers/snap-wrappers/charm $CRAFT_PART_INSTALL/bin/wrappers/

      # Generate version info from git tags (replaces vergit)
      desc=$(git describe --tags --always | sed 's/^v//')
      python3 -c "
      import json, sys
      desc = sys.argv[1]
      parts = desc.split('-', 2)
      if len(parts) >= 3:
          info = {'version': parts[0], 'git': '+' + parts[1] + '-' + parts[2], 'gitn': int(parts[1])}
      else:
          info = {'version': desc, 'git': '', 'gitn': 0}
      print(json.dumps(info))
      " "$desc" > $CRAFT_PART_INSTALL/charm-tools-version
      craftctl set version=$desc
    override-stage: |
      find $CRAFT_PART_INSTALL -type f -print0 | xargs -0 sed -i '1 s/^#\!.*python$/#\!\/usr\/bin\/env python3/'
      find $CRAFT_PART_INSTALL -type f -print0 | xargs -0 sed -i '1 s/^#\!.*python3$/#\!\/usr\/bin\/env python3/'
      craftctl default
    stage:
      # IMPORTANT! Only specify excludes here! Includes will break things!
      # See: https://forum.snapcraft.io/t/python-classic-snap-confusion-frustration-core18-entry-point-scripts-organize-stage-prime-override-build/10317
      # exclude unnecessary docs
      - -usr/share/doc*
      - -usr/share/lintian
      - -usr/share/git-web
      - -usr/share/man
      - -usr/share/perl*
      - -usr/share/pixmaps
      # exclude the embedded pip, so we can replace it
      - -lib/python*/site-packages/virtualenv_support/pip-*.whl
  patchelf:
    after:
      - charm-tools
    plugin: nil
    build-packages:
      - patchelf
      - file
    override-prime: |
      # patchelf
      #
      # To allow for a classic snap that works across multiple operating system
      # runtime environments, we need to ensure all shipped binaries consume
      # libraries from the core or shipped snap.  We accomplish this by
      # patching RPATH or interpreter into dynamically linked binaries.
      #
      # /snap/core24/current/lib/x86_64-linux-gnu/ld-linux-x86-64.so.2
      # /snap/core24/current/lib/aarch64-linux-gnu/ld-linux-aarch64.so.1
      # /snap/core24/current/lib/powerpc64le-linux-gnu/ld64.so.2
      # /snap/core24/current/lib/s390x-linux-gnu/ld64.so.1
      interp_prefix=/snap/core24/current/lib/$CRAFT_ARCH_TRIPLET
      ld_arch=$(echo $CRAFT_TARGET_ARCH | sed -e 's,amd64,x86-64,' -e 's,arm64,aarch64,')
      for interp in "ld-linux-${ld_arch}.so.?" "ld64.so.?" "/dev/null"; do
          if [ -e ${interp_prefix}/${interp} ]; then
              break
          fi
      done
      if [ $interp = /dev/null ]; then
          echo "Unable to determine name of shared library interpreter."
          exit 1
      fi

      for binary in \
        $(find . -exec file {} \; | awk -F\: '/ELF.*dynamic/{print$1}'); do
          patchelf \
              --force-rpath \
              --set-rpath /snap/core24/current/usr/lib/$CRAFT_ARCH_TRIPLET:/snap/$CRAFT_PROJECT_NAME/current/lib:/snap/$CRAFT_PROJECT_NAME/current/lib/$CRAFT_ARCH_TRIPLET:/snap/$CRAFT_PROJECT_NAME/current/usr/lib:/snap/$CRAFT_PROJECT_NAME/current/usr/lib/$CRAFT_ARCH_TRIPLET \
              $binary

          patchelf --set-interpreter $interp_prefix/$interp $binary || true
      done
